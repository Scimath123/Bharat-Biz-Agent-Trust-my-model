version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: bharat-biz-mysql
    environment:
      MYSQL_ROOT_PASSWORD: billa
      MYSQL_DATABASE: ai_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # FastAPI Backend
  backend:
    build: .
    container_name: bharat-biz-backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: billa
      DB_NAME: ai_db
      DB_PORT: 3306
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  mysql_data:
